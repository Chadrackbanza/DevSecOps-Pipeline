name: Security Scan

on:
  push:
    branches: [ main ]

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 0. Installation de jq
      - name: Install jq
        run: sudo apt-get install jq -y

      # 1. Scan Trivy
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nginx:latest'
          format: 'json'
          output: 'trivy-report.json'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      # 2. Filtrage du rapport Trivy
      - name: Filter Trivy report
        run: |
          jq '{SchemaVersion: .SchemaVersion, ArtifactName: .ArtifactName, Results: [.Results[]? | {Target: .Target, Class: .Class, Vulnerabilities: [.Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH")]}]}' trivy-report.json > trivy-report-light.json

      # 3. Import Trivy vers DefectDojo
      - name: Import Trivy to DefectDojo
        if: always()
        env:
          DD_API_TOKEN: ${{ secrets.DD_API_TOKEN }}
          DD_URL: ${{ secrets.DD_URL }}
        run: |
          curl -v -X POST "${DD_URL}/api/v2/import-scan/" \
               -H "Authorization: Token ${DD_API_TOKEN}" \
               -F "scan_type=Trivy Scan" \
               -F "file=@trivy-report-light.json" \
               -F "product_name=DevSecOps-Pipeline" \
               -F "engagement_name=CI-CD-Pipeline" \
               -F "auto_create_context=true"

      # 4. Import Kyverno (Fichier local poussé avec le code)
      - name: Import Kyverno to DefectDojo
        if: always()
        env:
          DD_API_TOKEN: ${{ secrets.DD_API_TOKEN }}
          DD_URL: ${{ secrets.DD_URL }}
        run: |
          # Ici, on utilise directement le fichier présent dans ton repo
          # Assure-toi que kyverno_dojo.json est bien dans ton dossier avant le push
          curl -v -X POST "${DD_URL}/api/v2/import-scan/" \
               -H "Authorization: Token ${DD_API_TOKEN}" \
               -F "scan_type=Generic Findings Import" \
               -F "file=@kyverno_dojo.json" \
               -F "product_name=DevSecOps-Pipeline" \
               -F "engagement_name=CI-CD-Pipeline" \
               -F "auto_create_context=true"
